<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Flujo del producto</title>
  <desc id="desc">Secuencia QR, perfil, evaluación, base de datos, racha y beneficios.</desc>
  <rect width="1200" height="420" rx="8" fill="#031549"/>
