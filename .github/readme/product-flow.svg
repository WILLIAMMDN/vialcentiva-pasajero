  <text x="64" y="98" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" font-weight="700" fill="#A7F3FF">La evaluación no termina en un formulario: alimenta reputación, datos y beneficios.</text>

  <g font-family="Inter, Segoe UI, Arial, sans-serif" font-weight="900">
