<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">Pantallas principales de VialCentiva</title>
  <desc id="desc">Tres pantallas móviles que representan portada, perfil de conductor y evaluación del viaje.</desc>
  <defs>
